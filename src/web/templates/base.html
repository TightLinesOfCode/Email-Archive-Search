<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Email Archive{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #2c2c2c;
      font-size: 14px;
    }

    /* ── Nav ─────────────────────────────── */
    nav {
      background: #1e2235;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .brand {
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      margin-right: auto;
      text-decoration: none;
    }
    nav a {
      color: #9da5bb;
      text-decoration: none;
      font-size: 13px;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom-color: #5b8dee; }

    /* ── Layout ──────────────────────────── */
    .container {
      max-width: 1080px;
      margin: 1.75rem auto;
      padding: 0 1.5rem;
    }

    /* ── Cards ───────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── Typography ──────────────────────── */
    h1 { font-size: 1.25rem; margin-bottom: 1.1rem; }
    h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #444; }

    a { color: #2a5bd7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Buttons ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 1rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; text-decoration: none; }
    .btn-primary   { background: #1e2235; color: #fff; }
    .btn-secondary { background: #eef0f4; color: #333; }
    .btn-success   { background: #1f7a4a; color: #fff; }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 12px; }
    .btn-danger { background: #dc2626; color: #fff; }

    /* ── Flash messages ──────────────────── */
    .flash {
      padding: 0.7rem 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      font-size: 13px;
    }
    .flash.success { background: #d1fae5; color: #065f46; }
    .flash.error   { background: #fee2e2; color: #991b1b; }

    /* ── Tables ──────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #9da5bb;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #e8eaf0;
    }
    tbody td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #f0f2f7;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfd; }

    /* ── Badges ──────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-size: 11px;
      background: #eef0f4;
      color: #555;
    }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-green { background: #d1fae5; color: #065f46; }

    /* ── Search bar ──────────────────────── */
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .search-bar input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }
    .search-bar input:focus { outline: none; border-color: #5b8dee; }

    /* ── Email meta rows ─────────────────── */
    .meta-grid {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 0.35rem 0.75rem;
      margin-bottom: 1rem;
    }
    .meta-label { font-size: 12px; color: #9da5bb; padding-top: 2px; }
    .meta-value { font-size: 13px; }

    /* ── Attachments ─────────────────────── */
    .attachment-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .attachment-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      font-size: 13px;
    }
    .attachment-item .file-meta { color: #9da5bb; font-size: 11px; }

    /* ── Email body iframe ───────────────── */
    .email-body-frame {
      width: 100%;
      min-height: 300px;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      margin-top: 1rem;
    }
    .email-body-text {
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.65;
      margin-top: 1rem;
      padding: 1rem;
      background: #fafbfd;
      border-radius: 6px;
      border: 1px solid #e8eaf0;
    }

    /* ── Index option cards ──────────────── */
    .index-options { display: flex; gap: 1rem; margin: 1rem 0; }
    .index-card {
      flex: 1;
      border: 2px solid #e8eaf0;
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .index-card:hover { border-color: #5b8dee; }
    .index-card input[type="radio"] { margin-right: 0.4rem; }
    .index-card h3 { font-size: 14px; margin-bottom: 0.3rem; }
    .index-card p  { font-size: 12px; color: #6b7280; line-height: 1.5; }

    /* ── Empty states ────────────────────── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #9da5bb;
    }
    .empty p { margin-top: 0.4rem; font-size: 13px; }

    /* ── Loading overlay ─────────────────── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.visible { display: flex; }
    .loading-card {
      background: #fff;
      border-radius: 10px;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      min-width: 300px;
      max-width: 420px;
    }
    .loading-card h3 { font-size: 16px; margin-bottom: .4rem; }
    .loading-card p  { color: #9da5bb; font-size: 13px; line-height: 1.5; margin-top: .3rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e8eaf0;
      border-top-color: #2a5bd7;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 1.25rem;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: '';    }
      25%  { content: '.';   }
      50%  { content: '..';  }
      75%  { content: '...'; }
    }

    /* ── Status bar ──────────────────────── */
    .status-bar {
      font-size: 12px;
      color: #9da5bb;
      margin-bottom: 1rem;
    }

    /* ── Delete toolbar ──────────────────── */
    .delete-toolbar {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 0.75rem;
      background: #e8f0fe;
      border-radius: 5px;
      margin-bottom: 0.75rem;
      font-size: 13px;
      color: #1e3a8a;
    }
    .delete-toolbar.visible { display: flex; }

    /* ── Checkbox column ─────────────────── */
    th.cb-cell, td.cb-cell {
      width: 36px;
      padding: 0.5rem 0.25rem 0.5rem 0.75rem !important;
    }
    input[type="checkbox"] { cursor: pointer; accent-color: #2a5bd7; }
    tbody tr.row-checked td { background: #e8f0fe !important; }

    /* ── Resizable columns ───────────────── */
    table.resizable thead th { position: relative; }
    .col-resize-handle {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 6px;
      cursor: col-resize;
      z-index: 2;
    }
    .col-resize-handle::after {
      content: '';
      position: absolute;
      right: 2px; top: 20%; bottom: 20%;
      width: 2px;
      border-radius: 1px;
      background: transparent;
      transition: background .15s;
    }
    .col-resize-handle:hover::after,
    .col-resize-handle.dragging::after { background: #5b8dee; }

    /* ── Sortable column headers ─────────── */
    thead th a {
      color: #9da5bb;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    thead th a:hover { color: #444; text-decoration: none; }
    thead th a.sort-active { color: #2c2c2c; }
    .sort-arrow { font-size: 10px; }

    /* ── Clickable rows ───────────────────── */
    tbody tr.clickable { cursor: pointer; }
    tbody tr.clickable:hover td { background: #f0f6ff; }

    /* ── Pagination ───────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid #f0f2f7;
      flex-wrap: wrap;
    }
    .pagination a, .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 0.5rem;
      border-radius: 4px;
      font-size: 13px;
      text-decoration: none;
      color: #555;
    }
    .pagination a:hover { background: #f0f2f7; text-decoration: none; }
    .pagination .pg-current { background: #dbeafe; color: #1e40af; font-weight: 600; }
    .pagination .pg-disabled { color: #ccc; pointer-events: none; }
    .pagination .pg-ellipsis { color: #9da5bb; min-width: 20px; }

    /* ── Folder tree ─────────────────────── */
    .folder-sidebar { width: 210px; flex-shrink: 0; padding: 0.5rem 0.5rem 0.75rem !important; }
    .folder-tree, .folder-tree ul { list-style: none; padding: 0; margin: 0; }
    .folder-tree .tree-children { padding-left: 14px; }
    .folder-tree .tree-children.hidden { display: none; }

    .tree-row {
      display: flex;
      align-items: center;
      border-radius: 20px;
      margin: 1px 0;
    }
    .tree-row:hover { background: #f0f2f7; }
    .tree-row.active { background: #d3e3fd; }

    .tree-link {
      flex: 1;
      font-size: 13.5px;
      color: #202124;
      text-decoration: none;
      padding: 0.3rem 0.5rem 0.3rem 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .tree-row.active .tree-link { color: #1a1a1a; font-weight: 700; }
    .tree-link:hover { text-decoration: none; }

    .folder-icon {
      flex-shrink: 0;
      width: 28px;
      font-size: 14px;
      text-align: center;
      padding-left: 4px;
    }
    .tree-spacer { flex-shrink: 0; width: 28px; }

    .tree-group-label {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
      color: #202124;
      padding: 0.3rem 0.5rem 0.3rem 0;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toggle-btn {
      flex-shrink: 0;
      width: 28px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #9da5bb;
      font-size: 8px;
      transition: transform 0.15s ease;
    }
    .toggle-btn.open { transform: rotate(90deg); }

    .tree-divider {
      height: 1px;
      background: #e8eaf0;
      margin: 6px 8px;
    }
    .tree-section-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9da5bb;
      padding: 6px 8px 2px;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="brand">&#9993; Email Archive</a>
  <a href="/"       {% if request.endpoint == 'email_list'  %}class="active"{% endif %}>Emails</a>
  <a href="/search" {% if request.endpoint == 'search_page' %}class="active"{% endif %}>Search</a>
  <a href="/stats"  {% if request.endpoint == 'stats_page'  %}class="active"{% endif %}>Stats &amp; Index</a>
  <a href="/admin"  {% if request.endpoint == 'admin_page'  %}class="active"{% endif %}>Admin</a>
  <a href="/fetch/preview" class="btn btn-primary btn-sm"
     onclick="showLoading('Connecting to server', 'Counting new emails — this may take a moment.')">
    &#8595; Fetch Emails
  </a>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>


<div id="loading-overlay" class="loading-overlay">
  <div class="loading-card">
    <div class="spinner" id="loading-spinner"></div>
    <h3 id="loading-title">Please wait<span class="loading-dots"></span></h3>
    <p id="loading-msg"></p>

    <!-- fetch-specific progress (hidden until a streaming fetch starts) -->
    <div id="fetch-progress" style="display:none;margin-top:1.1rem;width:100%">
      <div style="margin-bottom:.6rem;line-height:1">
        <span id="prog-n"
              style="font-size:2rem;font-weight:700;color:#1e2235">0</span>
        <span style="color:#9da5bb;font-size:13px"> of </span>
        <span id="prog-total"
              style="color:#9da5bb;font-size:13px">0</span>
        <span style="color:#9da5bb;font-size:13px"> emails</span>
      </div>
      <div style="background:#e8eaf0;border-radius:4px;height:7px;overflow:hidden;margin-bottom:.6rem">
        <div id="prog-bar"
             style="height:100%;background:#2a5bd7;border-radius:4px;width:0%;transition:width .4s ease">
        </div>
      </div>
      <div id="prog-subject"
           style="font-size:12px;color:#9da5bb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px;margin:0 auto">
      </div>
    </div>
  </div>
</div>

<script>
function showLoading(title, msg) {
  document.getElementById('loading-title').childNodes[0].textContent = title || 'Please wait';
  document.getElementById('loading-msg').textContent = msg || '';
  document.getElementById('loading-overlay').classList.add('visible');
}

/**
 * Generic SSE progress stream handler.
 * opts = {
 *   streamUrl   : string  — EventSource URL
 *   title       : string  — overlay title while running
 *   doneKey     : string  — key in the `done` payload to read the final count (e.g. 'new', 'deleted')
 *   doneTitle   : fn(n)   — returns the completion heading string
 *   redirectUrl : string  — page to navigate to after completion (default '/')
 *   total       : number  — expected count for the progress bar (0 = indeterminate)
 *   estimate    : string  — human-readable time estimate shown under the spinner
 *   subjectKey  : string  — key in progress events for the status line (default 'subject')
 *   folderKey   : string  — key in progress events for the folder  (default 'folder')
 * }
 */
function startProgressStream(opts) {
  const total      = opts.total      || 0;
  const redirectUrl = opts.redirectUrl || '/';

  document.getElementById('prog-total').textContent = total || '?';
  document.getElementById('fetch-progress').style.display = 'block';
  document.getElementById('loading-msg').textContent =
    opts.estimate ? 'Estimated time: ' + opts.estimate : '';
  showLoading(opts.title || 'Working');

  const source = new EventSource(opts.streamUrl);

  source.onmessage = function (evt) {
    const data = JSON.parse(evt.data);

    if (data.error) {
      source.close();
      document.getElementById('loading-title').childNodes[0].textContent = 'Failed';
      document.getElementById('loading-msg').textContent = data.error;
      document.getElementById('fetch-progress').style.display = 'none';
      return;
    }

    if (data.done) {
      source.close();
      const n = data[opts.doneKey] || 0;
      document.getElementById('prog-bar').style.width = '100%';
      document.getElementById('prog-subject').textContent = '';
      document.getElementById('prog-n').textContent = n;
      document.getElementById('loading-spinner').style.display = 'none';
      const title = document.getElementById('loading-title');
      title.childNodes[0].textContent = opts.doneTitle ? opts.doneTitle(n) : 'Done! ' + n;
      const dots = title.querySelector('.loading-dots');
      if (dots) dots.remove();
      document.getElementById('loading-msg').textContent =
        data.errors && data.errors.length ? data.errors.length + ' error(s).' : '';
      setTimeout(function () { window.location.href = redirectUrl; }, 1800);
      return;
    }

    // Progress event
    const n = data.n || 0;
    document.getElementById('prog-n').textContent = n;
    if (total > 0) {
      document.getElementById('prog-bar').style.width =
        Math.min(100, (n / total * 100)).toFixed(1) + '%';
    }
    const subjectKey = opts.subjectKey || 'subject';
    const folderKey  = opts.folderKey  || 'folder';
    const label = (data[folderKey] || '') + (data[subjectKey] ? '  ·  ' + data[subjectKey] : '');
    document.getElementById('prog-subject').textContent = label;
  };

  source.onerror = function () {
    source.close();
    document.getElementById('loading-title').childNodes[0].textContent = 'Connection lost';
    document.getElementById('loading-msg').textContent =
      'The operation may still be running in the background. Refresh the page to check.';
  };
}

function startFetchStream(total, estimate) {
  startProgressStream({
    streamUrl:   '/fetch/stream',
    title:       'Fetching emails',
    doneKey:     'new',
    doneTitle:   function (n) { return 'Done! ' + n + ' email' + (n !== 1 ? 's' : '') + ' archived'; },
    redirectUrl: '/',
    total:       total,
    estimate:    estimate,
    subjectKey:  'subject',
    folderKey:   'folder',
  });
}

function startPurgeStream(streamUrl) {
  startProgressStream({
    streamUrl:   streamUrl,
    title:       'Purging server',
    doneKey:     'deleted',
    doneTitle:   function (n) { return 'Done! ' + n + ' email' + (n !== 1 ? 's' : '') + ' deleted from server'; },
    redirectUrl: '/admin',
    total:       0,
    subjectKey:  'uid',
    folderKey:   'folder',
  });
}
</script>

</body>
</html>
