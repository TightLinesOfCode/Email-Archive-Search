<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}POP Email Archive{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #2c2c2c;
      font-size: 14px;
    }

    /* ── Nav ─────────────────────────────── */
    nav {
      background: #1e2235;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .brand {
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      margin-right: auto;
      text-decoration: none;
    }
    nav a {
      color: #9da5bb;
      text-decoration: none;
      font-size: 13px;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom-color: #5b8dee; }

    /* ── Layout ──────────────────────────── */
    .container {
      max-width: 1080px;
      margin: 1.75rem auto;
      padding: 0 1.5rem;
    }

    /* ── Cards ───────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── Typography ──────────────────────── */
    h1 { font-size: 1.25rem; margin-bottom: 1.1rem; }
    h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #444; }

    a { color: #2a5bd7; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Buttons ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 1rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; text-decoration: none; }
    .btn-primary   { background: #1e2235; color: #fff; }
    .btn-secondary { background: #eef0f4; color: #333; }
    .btn-success   { background: #1f7a4a; color: #fff; }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 12px; }

    /* ── Flash messages ──────────────────── */
    .flash {
      padding: 0.7rem 1rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      font-size: 13px;
    }
    .flash.success { background: #d1fae5; color: #065f46; }
    .flash.error   { background: #fee2e2; color: #991b1b; }

    /* ── Tables ──────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #9da5bb;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #e8eaf0;
    }
    tbody td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #f0f2f7;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfd; }

    /* ── Badges ──────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-size: 11px;
      background: #eef0f4;
      color: #555;
    }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-green { background: #d1fae5; color: #065f46; }

    /* ── Search bar ──────────────────────── */
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .search-bar input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }
    .search-bar input:focus { outline: none; border-color: #5b8dee; }

    /* ── Email meta rows ─────────────────── */
    .meta-grid {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 0.35rem 0.75rem;
      margin-bottom: 1rem;
    }
    .meta-label { font-size: 12px; color: #9da5bb; padding-top: 2px; }
    .meta-value { font-size: 13px; }

    /* ── Attachments ─────────────────────── */
    .attachment-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .attachment-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      font-size: 13px;
    }
    .attachment-item .file-meta { color: #9da5bb; font-size: 11px; }

    /* ── Email body iframe ───────────────── */
    .email-body-frame {
      width: 100%;
      min-height: 300px;
      border: 1px solid #e8eaf0;
      border-radius: 6px;
      margin-top: 1rem;
    }
    .email-body-text {
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.65;
      margin-top: 1rem;
      padding: 1rem;
      background: #fafbfd;
      border-radius: 6px;
      border: 1px solid #e8eaf0;
    }

    /* ── Index option cards ──────────────── */
    .index-options { display: flex; gap: 1rem; margin: 1rem 0; }
    .index-card {
      flex: 1;
      border: 2px solid #e8eaf0;
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .index-card:hover { border-color: #5b8dee; }
    .index-card input[type="radio"] { margin-right: 0.4rem; }
    .index-card h3 { font-size: 14px; margin-bottom: 0.3rem; }
    .index-card p  { font-size: 12px; color: #6b7280; line-height: 1.5; }

    /* ── Empty states ────────────────────── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #9da5bb;
    }
    .empty p { margin-top: 0.4rem; font-size: 13px; }

    /* ── Status bar ──────────────────────── */
    .status-bar {
      font-size: 12px;
      color: #9da5bb;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="brand">&#9993; POP Email Archive</a>
  <a href="/"       {% if request.endpoint == 'email_list'  %}class="active"{% endif %}>Inbox</a>
  <a href="/search" {% if request.endpoint == 'search_page' %}class="active"{% endif %}>Search</a>
  <a href="/stats"  {% if request.endpoint == 'stats_page'  %}class="active"{% endif %}>Stats &amp; Index</a>
  <form method="POST" action="/fetch" style="margin:0">
    <button class="btn btn-primary btn-sm">&#8595; Fetch Emails</button>
  </form>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
